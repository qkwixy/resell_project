<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CultBase</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f7);
            --text: var(--tg-theme-text-color, #222);
            --hint: var(--tg-theme-hint-color, #8e8e93);
            --link: var(--tg-theme-link-color, #2481cc);
            --btn-bg: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--sec-bg);
            color: var(--text);
            margin: 0; padding: 0; padding-bottom: 90px;
            user-select: none;
        }

        .header {
            background: var(--bg);
            padding: 16px 20px;
            position: sticky; top: 0; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-weight: bold;
            font-size: 18px;
        }

        .container { padding: 12px; }

        .card {
            background: var(--bg);
            border-radius: 16px;
            padding: 12px; margin-bottom: 12px;
            display: flex; align-items: center;
            gap: 12px; transition: transform 0.1s;
        }
        .card:active { transform: scale(0.98); }

        .img-placeholder {
            width: 50px; height: 50px;
            background: var(--sec-bg);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }

        .info { flex: 1; }
        .title { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
        .price { font-size: 14px; color: var(--hint); }

        .status-tag {
            font-size: 10px; font-weight: 800;
            padding: 3px 8px; border-radius: 6px;
            text-transform: uppercase;
        }
        .status-stock { background: #e1f5fe; color: #039be5; }

        .checkbox {
            width: 22px; height: 22px;
            border: 2px solid var(--hint);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
        }
        .card.selected .checkbox {
            background: var(--link);
            border-color: var(--link);
        }
        .card.selected .checkbox::after {
            content: '✓'; color: white; font-size: 14px;
        }

        .nav {
            position: fixed; bottom: 0; width: 100%;
            background: var(--bg);
            display: flex; justify-content: space-around;
            padding: 10px 0 25px; border-top: 1px solid rgba(0,0,0,0.05);
        }
        .nav-btn { text-align: center; color: var(--hint); font-size: 11px; flex: 1; cursor: pointer; }
        .nav-btn.active { color: var(--link); }
        .nav-icon { display: block; font-size: 22px; margin-bottom: 4px; }

        .main-btn {
            position: fixed; bottom: 85px; left: 12px; right: 12px;
            background: var(--btn-bg);
            color: var(--btn-text);
            padding: 14px; border-radius: 14px;
            text-align: center; font-weight: 700;
            display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <span>🏎 CultBase</span>
        <span id="stats" style="font-size: 12px; color: var(--hint);">0 выбрано</span>
    </div>

    <div class="container" id="app">
        <div style="text-align:center; margin-top:20px; color:var(--hint);">Загрузка склада...</div>
    </div>

    <div class="main-btn" id="actionBtn" onclick="sendToBot()">Продать выбранное</div>

    <div class="nav">
        <div class="nav-btn active"><span class="nav-icon">📦</span>Склад</div>
        <div class="nav-btn" onclick="sendCommand('import_excel')"><span class="nav-icon">➕</span>Закуп</div>
        <div class="nav-btn" onclick="sendCommand('export_pit36')"><span class="nav-icon">📊</span>PIT-36</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let selectedItems = [];

        // Отправка простых команд (Закуп, PIT-36)
        function sendCommand(cmd) {
            tg.sendData(JSON.stringify({ action: cmd }));
        }

        // Читаем данные, которые прислал бот в ссылке
        const urlParams = new URLSearchParams(window.location.search);
        const dataParam = urlParams.get('data');
        const appDiv = document.getElementById('app');

        if (dataParam) {
            const stockData = JSON.parse(decodeURIComponent(dataParam));
            appDiv.innerHTML = ''; 
            
            if (stockData.length === 0) {
                appDiv.innerHTML = '<div style="text-align:center; margin-top:20px; color:var(--hint);">Склад пуст. Нажми "Закуп" внизу.</div>';
            } else {
                stockData.forEach(item => {
                    appDiv.innerHTML += `
                    <div class="card" onclick="toggleSelect(this, ${item.id})">
                        <div class="img-placeholder">📦</div>
                        <div class="info">
                            <div class="title">${item.name}</div>
                            <div class="price">${item.price.toFixed(0)} zł <span class="status-tag status-stock">На складе</span></div>
                        </div>
                        <div class="checkbox"></div>
                    </div>`;
                });
            }
        }

        function toggleSelect(el, id) {
            el.classList.toggle('selected');
            if (el.classList.contains('selected')) {
                selectedItems.push(id);
            } else {
                selectedItems = selectedItems.filter(i => i !== id);
            }
            updateUI();
        }

        function updateUI() {
            const btn = document.getElementById('actionBtn');
            const stats = document.getElementById('stats');
            if (selectedItems.length > 0) {
                btn.style.display = 'block';
                btn.innerText = `Продать (${selectedItems.length})`;
                stats.innerText = `${selectedItems.length} выбрано`;
            } else {
                btn.style.display = 'none';
                stats.innerText = '0 выбрано';
            }
        }

        // Отправка данных о продаже
        function sendToBot() {
            let data = {
                action: 'sell_multi',
                ids: selectedItems
            };
            tg.sendData(JSON.stringify(data)); 
        }
    </script>
</body>
</html>
