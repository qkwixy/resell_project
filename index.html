<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CultBase Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Цветовая палитра: опора на системные цвета ТГ + премиум акценты */
        :root { 
            --accent: #007aff; 
            --bg: var(--tg-theme-bg-color, #ffffff); 
            --sec-bg: var(--tg-theme-secondary-bg-color, #f2f2f7); 
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #8e8e93);
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--sec-bg); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 100px; /* Место под плавающий навбар */
            -webkit-font-smoothing: antialiased;
        }

        /* Заголовок с эффектом стекла */
        .header { 
            background: rgba(var(--bg), 0.7); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            padding: 16px 20px; 
            font-weight: 800; 
            font-size: 22px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid rgba(142, 142, 147, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .container { padding: 16px; }
        
        .tab-content { display: none; animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .tab-content.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Карточки товаров */
        .card { 
            background: var(--bg); 
            border-radius: 20px; 
            padding: 16px; 
            margin-bottom: 14px; 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04); 
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.97); }
        .img-box { 
            font-size: 28px; 
            background: var(--sec-bg); 
            border-radius: 14px; 
            width: 56px; height: 56px; 
            display: flex; align-items: center; justify-content: center; 
        }
        .title { font-weight: 700; font-size: 17px; margin-bottom: 4px; }
        .price { color: var(--accent); font-weight: 600; font-size: 15px; }

        /* Премиум формы */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: var(--hint); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select { 
            width: 100%; 
            padding: 16px; 
            border-radius: 16px; 
            border: none; 
            background: var(--bg); 
            color: var(--text); 
            font-size: 16px; 
            box-sizing: border-box; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            appearance: none;
            outline: none;
        }
        input:focus, select:focus { box-shadow: 0 0 0 2px var(--accent); }

        .btn { 
            background: var(--accent); 
            color: #fff; 
            width: 100%; 
            padding: 16px; 
            border-radius: 16px; 
            border: none; 
            font-size: 17px; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }

        /* Плавающий навбар */
        .floating-nav { 
            position: fixed; 
            bottom: 24px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(30, 30, 30, 0.85); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex; 
            border-radius: 30px; 
            padding: 6px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            z-index: 1000;
        }
        .nav-item { 
            color: #a1a1aa; 
            padding: 10px 24px; 
            border-radius: 24px; 
            font-size: 14px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease;
        }
        .nav-item.active { background: #ffffff; color: #000000; }
        
        .error-msg { color: #ff3b30; text-align: center; padding: 20px; font-weight: 600; background: var(--bg); border-radius: 16px;}
    </style>
</head>
<body>

    <div class="header">🏎 CultBase</div>

    <div class="container">
        <div id="tab-stock" class="tab-content active">
            <div id="stock-list">
                <div style="text-align: center; color: var(--hint); padding: 40px 0;">Загрузка данных...</div>
            </div>
        </div>

        <div id="tab-add" class="tab-content">
            <div class="form-group">
                <label class="form-label">Что купили?</label>
                <input type="text" id="name" placeholder="Например: Yeezy Boost 350">
            </div>
            
            <div style="display:flex; gap:12px;">
                <div class="form-group" style="flex: 2;">
                    <label class="form-label">Цена</label>
                    <input type="number" id="price" placeholder="0.00">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">Валюта</label>
                    <select id="currency">
                        <option value="PLN">PLN</option>
                        <option value="EUR">EUR</option>
                        <option value="CNY">CNY</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Доставка (в PLN)</label>
                <input type="number" id="ship" placeholder="Например: 45">
            </div>

            <button class="btn" id="save-btn" onclick="addItem()">Добавить на склад</button>
        </div>
    </div>

    <div class="floating-nav">
        <div class="nav-item active" onclick="switchTab('tab-stock', this); loadStock();">Склад</div>
        <div class="nav-item" onclick="switchTab('tab-add', this)">Закуп</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Твоя ссылка без слэша на конце!
        const API_URL = "https://sierra-stopped-gizmo.ngrok-free.dev"; 
        
        const urlParams = new URLSearchParams(window.location.search);
        const USER_ID = urlParams.get('user_id');

        const reqHeaders = { 
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true' 
        };

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        async function loadStock() {
            if(!USER_ID) return;
            const list = document.getElementById('stock-list');
            
            try {
                const res = await fetch(`${API_URL}/api/stock?user_id=${USER_ID}`, { headers: reqHeaders });
                const items = await res.json();
                
                if (items.length === 0) {
                    list.innerHTML = '<div class="error-msg" style="color:var(--hint);">Склад пуст. Перейди в "Закуп", чтобы добавить товар.</div>';
                    return;
                }
                
                list.innerHTML = '';
                items.forEach(i => {
                    list.innerHTML += `
                    <div class="card">
                        <div class="img-box">📦</div>
                        <div>
                            <div class="title">${i.name}</div>
                            <div class="price">${i.price.toFixed(2)} PLN</div>
                        </div>
                    </div>`;
                });
            } catch (e) {
                list.innerHTML = '<div class="error-msg">⚠️ Ошибка связи с сервером. Проверь ngrok и bot.py!</div>';
            }
        }

        async function addItem() {
            const btn = document.getElementById('save-btn');
            const data = {
                user_id: USER_ID,
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                currency: document.getElementById('currency').value,
                ship: document.getElementById('ship').value || 0
            };
            
            if(!data.name || !data.price) {
                tg.HapticFeedback.notificationOccurred('error');
                return tg.showAlert("Укажи название и цену!");
            }

            btn.innerText = "Загрузка...";
            btn.style.opacity = "0.7";
            
            try {
                const res = await fetch(`${API_URL}/api/add`, { 
                    method: 'POST', 
                    headers: reqHeaders, 
                    body: JSON.stringify(data) 
                });
                
                if(res.ok) {
                    tg.HapticFeedback.notificationOccurred('success');
                    document.getElementById('name').value = '';
                    document.getElementById('price').value = '';
                    document.getElementById('ship').value = '';
                    switchTab('tab-stock', document.querySelectorAll('.nav-item')[0]);
                    loadStock();
                }
            } catch (e) {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("Ошибка сервера! Проверь запущен ли ngrok.");
            }
            
            btn.innerText = "Добавить на склад";
            btn.style.opacity = "1";
        }

        // Запуск
        loadStock();
    </script>
</body>
</html>
