<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CultBase V1.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #007aff;
            --bg: #000000;
            --card-bg: #1c1c1e;
            --text: #ffffff;
            --secondary-text: #8e8e93;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* ШАПКА С ТГ КАНАЛОМ */
        .top-bar {
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 0.5px solid #38383a;
        }

        .brand { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
        
        .tg-link {
            background: #2481cc;
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .container { padding: 16px; }

        /* КАРТОЧКИ СКЛАДА */
        .card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 0.5px solid #38383a;
        }

        .card-img {
            width: 50px; height: 50px;
            background: #2c2c2e;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }

        .card-info { flex: 1; }
        .card-name { font-weight: 600; font-size: 16px; margin-bottom: 2px; }
        .card-price { color: var(--accent); font-weight: 700; font-size: 14px; }

        /* ФОРМЫ */
        .input-group { margin-bottom: 15px; }
        label { font-size: 12px; color: var(--secondary-text); margin-left: 5px; text-transform: uppercase; }
        
        input, select {
            width: 100%;
            background: #1c1c1e;
            border: none;
            padding: 15px;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .btn-action {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            margin-top: 10px;
        }

        /* НИЖНИЙ НАВБАР */
        .navbar {
            position: fixed; bottom: 25px;
            left: 20px; right: 20px;
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            display: flex;
            padding: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 0.5px solid #38383a;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            color: var(--secondary-text);
            font-size: 11px;
            font-weight: 500;
            border-radius: 18px;
            transition: 0.2s;
        }

        .nav-item.active {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        .nav-icon { display: block; font-size: 20px; margin-bottom: 2px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">CULTBASE</div>
        <a href="https://t.me/resell_culture" class="tg-link">
            <span>📢 Канал</span>
        </a>
    </div>

    <div class="container">
        <div id="tab-stock" class="tab-content active">
            <div id="stock-list">Загрузка данных...</div>
        </div>

        <div id="tab-add" class="tab-content">
            <div class="input-group">
                <label>Название</label>
                <input type="text" id="name" placeholder="Например: Nike Dunk Low">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 2;">
                    <label>Цена закупа</label>
                    <input type="number" id="price" placeholder="0.00">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Валюта</label>
                    <select id="currency">
                        <option value="PLN">PLN</option>
                        <option value="EUR">EUR</option>
                        <option value="CNY">CNY</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>Доставка (PLN)</label>
                <input type="number" id="ship" placeholder="0.00">
            </div>
            <button class="btn-action" onclick="saveItem()">📦 Добавить на склад</button>
        </div>

        <div id="tab-stats" class="tab-content">
            <div class="card" style="flex-direction: column; align-items: flex-start;">
                <div style="color: var(--secondary-text); font-size: 12px;">ОБЩИЙ КАПИТАЛ</div>
                <div style="font-size: 28px; font-weight: 800;" id="total-val">0.00 zł</div>
            </div>
            <button class="btn-action" style="background: #2c2c2e;" onclick="getReport()">📊 Получить PIT-36 в чат</button>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-item active" onclick="switchTab('tab-stock', this); loadStock();">
            <span class="nav-icon">📦</span>Склад
        </div>
        <div class="nav-item" onclick="switchTab('tab-add', this)">
            <span class="nav-icon">➕</span>Закуп
        </div>
        <div class="nav-item" onclick="switchTab('tab-stats', this)">
            <span class="nav-icon">📊</span>Отчеты
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#000000';
        tg.headerColor = '#1c1c1e';

        const API_URL = "https://sierra-stopped-gizmo.ngrok-free.dev"; 
        const USER_ID = new URLSearchParams(window.location.search).get('user_id');

        const headers = { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' };

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
        }

        async function loadStock() {
            const res = await fetch(`${API_URL}/api/stock?user_id=${USER_ID}`, { headers });
            const items = await res.json();
            const list = document.getElementById('stock-list');
            let total = 0;
            
            list.innerHTML = items.length ? '' : '<div style="text-align:center; padding:50px; color:#8e8e93;">Пусто</div>';
            
            items.forEach(i => {
                total += i.price;
                list.innerHTML += `
                <div class="card">
                    <div class="card-img">👟</div>
                    <div class="card-info">
                        <div class="card-name">${i.name}</div>
                        <div class="card-price">${i.price.toFixed(0)} PLN</div>
                    </div>
                </div>`;
            });
            document.getElementById('total-val').innerText = total.toFixed(2) + ' zł';
        }

        async function saveItem() {
            const data = {
                user_id: USER_ID,
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                currency: document.getElementById('currency').value,
                ship: document.getElementById('ship').value || 0
            };
            if(!data.name || !data.price) return tg.showAlert("Заполни данные!");
            
            await fetch(`${API_URL}/api/add`, { method: 'POST', headers, body: JSON.stringify(data) });
            tg.HapticFeedback.notificationOccurred('success');
            tg.showPopup({ message: "Товар добавлен!", buttons: [{type: 'close'}] });
            
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            loadStock();
        }

        async function getReport() {
            await fetch(`${API_URL}/api/report`, { method: 'POST', headers, body: JSON.stringify({user_id: USER_ID}) });
            tg.showPopup({ title: "Отправка", message: "Отчет PIT-36 формируется и придет в чат через секунду." });
        }

        loadStock();
    </script>
</body>
</html>
